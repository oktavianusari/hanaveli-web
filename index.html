<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanaveli - Foreign Exchange & Gold Portfolio Monitor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.0.7">
</head>
<body>
    <div id="app-container" class="app-container">
        <!-- Main Header -->
        <header class="app-header">
            <div class="header-logo">
                <span class="logo-icon">🪙</span>
                <div class="logo-text">
                    <h1>Hanaveli</h1>
                    <span id="sync-status">Memuat data...</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-refresh" class="btn-icon" title="Segarkan Kurs">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                </button>
                <button id="btn-widget-toggle" class="btn-icon" title="Mode Widget">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="app-nav" id="app-nav">
            <button class="nav-tab active" data-tab="monitor"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>Monitor</button>
            <button class="nav-tab" data-tab="saham"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>Saham</button>
            <button class="nav-tab" data-tab="history"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>Riwayat</button>
            <button class="nav-tab" data-tab="total"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>Total</button>
            <button class="nav-tab" data-tab="settings"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>Setelan</button>
        </nav>

        <!-- Main Content Area -->
        <main class="app-content">
            <!-- Monitor Tab -->
            <section id="tab-monitor" class="tab-pane active">
                <div class="update-banner" id="update-banner">
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <div class="banner-item"><span class="lbl">BCA:</span> <span id="bca-time">-</span></div>
                        <div class="banner-item"><span class="lbl">IndoGold:</span> <span id="indogold-time">-</span></div>
                    </div>
                    <button class="btn-sync-widget" title="Segarkan Data">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                </div>
                <div id="currency-list" class="currency-list">
                    <!-- Dynamic currency cards -->
                </div>
                <button id="btn-add-currency-trigger" class="fab" title="Tambah Mata Uang">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </section>

            <!-- Saham Tab -->
            <section id="tab-saham" class="tab-pane">
                <div class="update-banner" id="stock-update-banner">
                    <div class="banner-item"><span class="lbl">Pasar Saham:</span> <span id="stocks-time">Live dari Yahoo Finance</span></div>
                    <button class="btn-sync-widget" title="Segarkan Data">
                        <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-svg"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                </div>
                <div id="stock-list" class="currency-list">
                    <!-- Dynamic stock cards -->
                </div>
                <button id="btn-add-stock-trigger" class="fab" title="Tambah Saham">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </section>

            <!-- History Tab -->
            <section id="tab-history" class="tab-pane">
                <div class="action-row">
                    <button id="btn-add-trx-trigger" class="btn btn-primary"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>Transaksi Baru</button>
                    <div class="backup-actions">
                        <button id="btn-export" class="btn btn-secondary"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>Ekspor JSON</button>
                        <label for="import-file" class="btn btn-secondary" style="cursor: pointer;">
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; vertical-align: middle;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>Impor JSON
                            <input type="file" id="import-file" accept=".json" style="display: none;">
                        </label>
                    </div>
                </div>
                <div class="table-container">
                    <table class="trx-table">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Valas</th>
                                <th>Tipe</th>
                                <th>Nilai Kurs</th>
                                <th>Jumlah</th>
                                <th>Total (IDR)</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="trx-list">
                            <!-- Dynamic transaction list -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Total Tab -->
            <section id="tab-total" class="tab-pane">
                <div class="portfolio-summary-card">
                    <span class="summary-label">Estimasi Nilai Total Portofolio</span>
                    <h2 id="grand-total-idr">Rp0</h2>
                </div>
                <div id="total-assets-list" class="assets-list">
                    <!-- Dynamic total list -->
                </div>
            </section>

            <!-- Settings Tab -->
            <section id="tab-settings" class="tab-pane">
                <div class="settings-group">
                    <h3>📈 Preferensi Kurs</h3>
                    <div class="setting-item">
                        <label for="set-rate-type">Tipe Kurs BCA</label>
                        <select id="set-rate-type" class="form-control">
                            <option value="e-rate">e-Rate BCA</option>
                            <option value="bank notes">Bank Notes BCA</option>
                            <option value="tt counter">TT Counter BCA</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="set-rate-dir">Arah Kurs Valas</label>
                        <select id="set-rate-dir" class="form-control">
                            <option value="jual">Jual Bank (Harga Beli User)</option>
                            <option value="beli">Beli Bank (Harga Jual User)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="set-emas-dir">Arah Kurs Emas</label>
                        <select id="set-emas-dir" class="form-control">
                            <option value="jual">Jual IndoGold (Harga Beli User)</option>
                            <option value="beli">Beli IndoGold (Harga Jual User)</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="set-sync-interval">Frekuensi Sinkronisasi Kurs</label>
                        <select id="set-sync-interval" class="form-control">
                            <option value="5">5 Menit Sekali</option>
                            <option value="15">15 Menit Sekali</option>
                            <option value="30">30 Menit Sekali</option>
                            <option value="45">45 Menit Sekali</option>
                            <option value="60">1 Jam Sekali</option>
                        </select>
                    </div>
                </div>

                <div class="settings-group">
                    <h3>🎨 Tampilan & Tema</h3>
                    <div class="setting-item">
                        <label for="set-theme">Tema Warna</label>
                        <select id="set-theme" class="form-control">
                            <option value="system">Sistem (Auto)</option>
                            <option value="light">Terang</option>
                            <option value="dark">Gelap</option>
                            <option value="sunset">Sunset Forest (Vivaldi)</option>
                            <option value="zen">Zen (Vivaldi)</option>
                            <option value="vivaldi">Vivaldi Red</option>
                            <option value="custom">Kustomisasi Warna</option>
                        </select>
                    </div>
                    <div id="custom-color-pickers" class="custom-color-pickers hidden">
                        <div class="picker-row">
                            <label>Primary Color</label>
                            <input type="color" id="color-primary" value="#386A20">
                        </div>
                        <div class="picker-row">
                            <label>Secondary Color</label>
                            <input type="color" id="color-secondary" value="#D7E8CD">
                        </div>
                        <div class="picker-row">
                            <label>Text Color</label>
                            <input type="color" id="color-text" value="#1A1C18">
                        </div>
                    </div>
                </div>

                <div class="settings-group">
                    <h3>🌐 Bahasa</h3>
                    <div class="setting-item">
                        <label for="set-lang">Bahasa Aplikasi</label>
                        <select id="set-lang" class="form-control">
                            <option value="system">Sistem (Auto)</option>
                            <option value="id">Bahasa Indonesia</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Dialogs -->
    <div id="modal-container" class="modal-overlay hidden">
        <!-- Add Currency Modal -->
        <div id="modal-add-currency" class="modal-card hidden">
            <h3>Tambah Valas untuk Dimonitor</h3>
            <div class="modal-body">
                <label for="add-currency-select">Pilih Mata Uang</label>
                <select id="add-currency-select" class="form-control">
                    <!-- Dynamically populated available currencies -->
                </select>
            </div>
            <div class="modal-footer">
                <button id="btn-add-currency-cancel" class="btn btn-secondary">Batal</button>
                <button id="btn-add-currency-confirm" class="btn btn-primary">Tambah</button>
            </div>
        </div>

        <!-- Add Stock Modal -->
        <div id="modal-add-stock" class="modal-card hidden">
            <h3>Tambah Saham untuk Dimonitor</h3>
            <div class="modal-body">
                <label for="add-stock-select">Pilih Kode Saham (Ticker)</label>
                <select id="add-stock-select" class="form-control">
                    <!-- Dynamically populated stock options -->
                </select>
            </div>
            <div class="modal-footer">
                <button id="btn-add-stock-cancel" class="btn btn-secondary">Batal</button>
                <button id="btn-add-stock-confirm" class="btn btn-primary">Tambah</button>
            </div>
        </div>

        <!-- Add/Edit Transaction Modal -->
        <div id="modal-transaction" class="modal-card hidden">
            <h3 id="modal-trx-title">Transaksi Baru</h3>
            <div class="modal-body">
                <input type="hidden" id="trx-id">
                <div class="form-group">
                    <label for="trx-currency">Mata Uang / Aset</label>
                    <select id="trx-currency" class="form-control">
                        <!-- currencies -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="trx-type">Jenis Transaksi</label>
                    <select id="trx-type" class="form-control">
                        <option value="BUY">BELI (Tambah Aset)</option>
                        <option value="SELL">JUAL (Kurangi Aset)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="trx-rate">Nilai Kurs Transaksi (IDR per unit)</label>
                    <input type="number" id="trx-rate" class="form-control" placeholder="Contoh: 16250" step="any" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="trx-amount">Jumlah Unit</label>
                    <input type="number" id="trx-amount" class="form-control" placeholder="Contoh: 100" step="any" min="0.0001" required>
                </div>
                <div class="form-group">
                    <label for="trx-date">Tanggal Transaksi</label>
                    <input type="datetime-local" id="trx-date" class="form-control" required>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-trx-cancel" class="btn btn-secondary">Batal</button>
                <button id="btn-trx-confirm" class="btn btn-primary">Simpan</button>
            </div>
        </div>
    </div>

    <!-- App JavaScript -->
    <script src="scraper.js?v=1.0.7"></script>
    <script src="app.js?v=1.0.7"></script>
</body>
</html>
